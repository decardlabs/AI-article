<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #ffffff; --text: #1a1a1a; --text-sec: #666;
      --text-ter: #999; --border: #e0e0e0; --accent: #378add;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font); font-size: 14px; color: var(--text); background: #f5f5f5; padding: 40px; }
    .container { max-width: 520px; margin: 0 auto; background: var(--bg); border-radius: 12px; border: 0.5px solid var(--border); padding: 24px; }
    h1 { font-size: 16px; font-weight: 500; margin-bottom: 24px; }
    .group { margin-bottom: 20px; }
    .group-title { font-size: 11px; color: var(--text-ter); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    label { display: block; font-size: 12px; color: var(--text-sec); margin-bottom: 4px; margin-top: 12px; }
    label:first-child { margin-top: 0; }
    input, select { width: 100%; padding: 8px 10px; font-size: 13px; border: 0.5px solid var(--border); border-radius: 6px; outline: none; }
    input:focus, select:focus { border-color: var(--accent); }
    .row { display: flex; gap: 8px; align-items: flex-end; }
    .row select { flex: 0 0 120px; }
    .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px; border-top: 0.5px solid var(--border); padding-top: 16px; }
    button { padding: 8px 24px; font-size: 13px; border: 0.5px solid var(--border); border-radius: 6px; background: transparent; cursor: pointer; }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 500; }
    .test-btn { flex: 0 0 auto; padding: 8px 16px; font-size: 12px; cursor: pointer; }
    #status { margin-top: 12px; font-size: 12px; padding: 8px 12px; border-radius: 6px; display: none; }
    #status.success { display: block; background: #eaf3de; color: #3b6d11; }
    #status.error { display: block; background: #fcebeb; color: #a32d2d; }
    .sep { border: none; border-top: 0.5px solid var(--border); margin: 20px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>obsidian 剪藏 — 设置</h1>

    <div class="group">
      <div class="group-title">存储</div>
      <label>Obsidian 仓库路径</label>
      <div class="row">
        <input id="vault-path" value="/Users/macairm5/Documents/obsidian" />
      </div>
      <label>保存目录</label>
      <input id="save-dir" value="AI知识库" />
      <label>服务端口</label>
      <input id="service-port" value="8765" style="width: 100px;" />
    </div>

    <hr class="sep" />

    <div class="group">
      <div class="group-title">AI 配置</div>
      <label>AI 供应商</label>
      <div class="row">
        <select id="provider">
          <option value="deepseek">DeepSeek</option>
          <option value="openai">OpenAI</option>
          <option value="custom">自定义</option>
        </select>
        <input id="api-base-url" placeholder="https://api.deepseek.com/v1" style="flex:1" />
      </div>
      <label>API Key</label>
      <input id="api-key" type="password" placeholder="sk-..." />
      <label>模型</label>
      <div class="row">
        <input id="model" value="deepseek-chat" style="flex:1" />
        <button class="test-btn" id="btn-test">测试</button>
      </div>
      <label>默认标签（逗号分隔）</label>
      <input id="default-tags" value="daily-save, web-clip" />
    </div>

    <div id="status"></div>

    <div class="btn-row">
      <button id="btn-reset">重置</button>
      <button class="primary" id="btn-save">保存设置</button>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
