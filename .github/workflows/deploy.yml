name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          eval $(ssh-agent -s)
          # tr -d '\r' 确保去掉可能的 Windows 换行符
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' | ssh-add -
          ssh-keyscan -H kb.ccbot.chat >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.next/cache' \
            --exclude='.next/trace' \
            --exclude='.git' \
            ./ root@kb.ccbot.chat:/www/wwwroot/kb.ccbot.chat/

      - name: Restart PM2
        run: |
          ssh root@kb.ccbot.chat 'pm2 restart ai-knowledge --update-env'
