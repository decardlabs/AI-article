name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Package source
        run: |
          tar czf /tmp/deploy.tar.gz \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.git' \
            -C . .

      - name: Setup SSH and deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -p -m PEM -f ~/.ssh/id_rsa -N "" -q
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

          # Upload tarball (warning at rsync exit code 23 is OK - it's just .user.ini)
          set +e
          rsync -avz /tmp/deploy.tar.gz "$SSH_USER@$SSH_HOST:/tmp/"
          set -e

          ssh "$SSH_USER@$SSH_HOST" bash -s << 'REMOTESHELL'
            set -euo pipefail
            TARGET="/www/wwwroot/kb.ccbot.chat"

            echo "[1/5] Extracting..."
            tar xzf /tmp/deploy.tar.gz -C "$TARGET" --overwrite
            rm -f /tmp/deploy.tar.gz

            echo "[2/5] Installing dependencies..."
            cd "$TARGET"
            npm ci

            echo "[3/5] Building Next.js..."
            rm -rf .next
            npm run build

            echo "[4/5] Restarting PM2..."
            pm2 restart ai-knowledge --update-env

            echo "[5/5] Clearing nginx cache..."
            rm -rf /www/server/nginx/proxy_cache_dir/* || true

            echo "Deploy complete."
          REMOTESHELL
