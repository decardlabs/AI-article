name: Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -p -m PEM -f ~/.ssh/id_rsa -N "" -q

      - name: Upload source code to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          rsync -avz --delete --exclude='.next' --exclude='node_modules' --exclude='.git' ./ "$SSH_USER@$SSH_HOST:/www/wwwroot/kb.ccbot.chat/"

      - name: Build and restart on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" bash -s << 'REMOTESHELL'
            set -euo pipefail
            cd /www/wwwroot/kb.ccbot.chat

            echo "[1/4] Installing dependencies..."
            npm ci

            echo "[2/4] Generating article data..."
            node scripts/generate-data.mjs

            echo "[3/4] Building Next.js..."
            npm run build

            echo "[4/4] Restarting PM2..."
            pm2 restart ai-knowledge --update-env
            echo "Deploy complete."
          REMOTESHELL
